<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - 药酱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 这里的背景色可以根据你喜欢的壁纸调整，目前是深色科技感 */
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .icon-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .icon-btn:hover { transform: translateY(-5px) scale(1.1); filter: drop-shadow(0 5px 15px rgba(255,255,255,0.1)); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="flex flex-wrap justify-center gap-5 mb-12 px-6 py-4 glass rounded-3xl shadow-2xl">
        <a href="https://gemini.google.com" target="_blank" class="icon-btn p-2 rounded-xl">
            <img src="https://raw.githubusercontent.com/simple-icons/simple-icons/develop/icons/googlegemini.svg" class="w-8 h-8" style="filter: drop-shadow(0 0 5px #4285F4);" title="Gemini">
        </a>
        <a href="https://www.bilibili.com" target="_blank" class="icon-btn p-2 rounded-xl">
            <img src="https://cdn.simpleicons.org/bilibili/00AEEC" class="w-8 h-8" title="Bilibili">
        </a>
        <a href="https://t.me" target="_blank" class="icon-btn p-2 rounded-xl">
            <img src="https://cdn.simpleicons.org/telegram/26A5E4" class="w-8 h-8" title="Telegram">
        </a>
        <a href="https://github.com" target="_blank" class="icon-btn p-2 rounded-xl">
            <img src="https://cdn.simpleicons.org/github/white" class="w-8 h-8" title="GitHub">
        </a>
        <a href="https://x.com" target="_blank" class="icon-btn p-2 rounded-xl">
            <img src="https://cdn.simpleicons.org/x/white" class="w-8 h-8" title="X">
        </a>
        <a href="https://www.reddit.com" target="_blank" class="icon-btn p-2 rounded-xl">
            <img src="https://cdn.simpleicons.org/reddit/FF4500" class="w-8 h-8" title="Reddit">
        </a>
        <a href="https://www.zhihu.com" target="_blank" class="icon-btn p-2 rounded-xl">
            <img src="https://cdn.simpleicons.org/zhihu/0084FF" class="w-8 h-8" title="知乎">
        </a>
        <a href="https://www.acfun.cn" target="_blank" class="icon-btn p-2 rounded-xl">
            <img src="https://cdn.simpleicons.org/anilist/3DB5F3" class="w-8 h-8" style="filter: hue-rotate(150deg);" title="ACFun">
        </a>
        <a href="https://www.youtube.com" target="_blank" class="icon-btn p-2 rounded-xl">
            <img src="https://cdn.simpleicons.org/youtube/FF0000" class="w-8 h-8" title="YouTube">
        </a>
    </div>

    <div class="w-full max-w-2xl">
        <div class="glass p-2 rounded-2xl flex items-center shadow-2xl focus-within:ring-2 focus-within:ring-blue-500/50 transition-all">
            <select id="engine" class="bg-transparent text-sm px-4 outline-none border-r border-slate-700 cursor-pointer text-slate-400">
                <option value="https://www.google.com/search?q=">Google</option>
                <option value="https://www.bing.com/search?q=">Bing</option>
                <option value="https://github.com/search?q=">GitHub</option>
            </select>
            <input type="text" id="search-input" autofocus 
                   placeholder="键入并搜索..." 
                   class="bg-transparent w-full px-5 py-3 outline-none text-xl placeholder-slate-500">
        </div>
        <div class="mt-4 flex justify-center gap-4 text-[10px] text-slate-500 tracking-[0.2em] uppercase">
            <span>Alt + 1/2/3 切换引擎</span>
            <span>/ 快速聚焦</span>
        </div>
    </div>

    <script>
        const input = document.getElementById('search-input');
        const engineSelect = document.getElementById('engine');

        // 执行搜索
        function doSearch() {
            const query = input.value.trim();
            if (query) {
                window.location.href = engineSelect.value + encodeURIComponent(query);
            }
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch();
        });

        // 快捷键逻辑
        window.addEventListener('keydown', (e) => {
            // 按 / 键自动聚焦搜索框
            if (e.key === '/' && document.activeElement !== input) {
                e.preventDefault();
                input.focus();
            }
            // Alt + 数字切换引擎
            if (e.altKey && ['1', '2', '3'].includes(e.key)) {
                engineSelect.selectedIndex = parseInt(e.key) - 1;
                input.focus();
            }
        });
    </script>
</body>
</html>
