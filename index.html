<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Dashboard - 药酱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #1b2838; /* Steam 经典深蓝底色 */
            background-image: 
                linear-gradient(to bottom, rgba(27, 40, 56, 0.8), rgba(27, 40, 56, 0.95)),
                url('https://images.unsplash.com/photo-1464802686167-b939a67e06a1?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #c7d5ed;
            font-family: "Motiva Sans", Arial, sans-serif;
        }

        /* Steam 蓝光效果 */
        .steam-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(103, 193, 245, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .steam-card:hover {
            border-color: rgba(103, 193, 245, 0.5);
            box-shadow: 0 0 20px rgba(103, 193, 245, 0.2);
        }

        .showcase-img {
            transition: transform 0.5s ease, filter 0.5s ease;
            filter: brightness(0.8);
        }

        .showcase-img:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        /* 下拉菜单动画 */
        .dropdown-content {
            display: none;
            animation: fadeIn 0.2s ease-out;
        }
        .group:hover .dropdown-content { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="w-full bg-[#171a21]/80 backdrop-blur-md px-10 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex gap-6 text-sm font-bold tracking-widest text-[#dcdedf]">
            <a href="#" class="hover:text-white">STORE</a>
            <a href="#" class="hover:text-white">COMMUNITY</a>
            <a href="https://github.com/tokyomoonlight" class="hover:text-white text-[#67c1f5]">YAOJIANG</a>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="relative group">
                <button class="flex items-center gap-1 hover:text-white text-sm">GOOGLE APPS <span class="text-[10px]">▼</span></button>
                <div class="dropdown-content absolute right-0 mt-2 w-48 bg-[#3d4450] shadow-2xl rounded-sm p-1 border border-gray-600">
                    <a href="https://mail.google.com" class="block px-4 py-2 hover:bg-[#67c1f5] hover:text-white text-xs">Gmail</a>
                    <a href="https://docs.google.com" class="block px-4 py-2 hover:bg-[#67c1f5] hover:text-white text-xs">Google Docs</a>
                    <a href="https://drive.google.com" class="block px-4 py-2 hover:bg-[#67c1f5] hover:text-white text-xs">Drive</a>
                </div>
            </div>
            <div class="w-8 h-8 rounded-sm bg-gradient-to-br from-[#67c1f5] to-[#417b9b] p-[1px]">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-full h-full object-cover" alt="Avatar">
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto mt-12 px-4">
        
        <div class="mb-16">
            <div class="steam-card p-2 rounded flex items-center focus-within:ring-1 focus-within:ring-[#67c1f5] transition-all">
                <select id="engine" class="bg-[#2a475e] text-xs px-3 py-2 rounded-sm outline-none text-[#67c1f5] font-bold">
                    <option value="https://www.google.com/search?q=">GOOGLE</option>
                    <option value="https://github.com/search?q=">GITHUB</option>
                    <option value="https://www.bing.com/search?q=">BING</option>
                </select>
                <input type="text" id="search-input" autofocus placeholder="Search your library..." 
                       class="bg-transparent w-full px-5 py-3 outline-none text-xl placeholder-gray-600">
            </div>
        </div>

        <section class="steam-card rounded-sm mb-10">
            <div class="bg-[#1b2838]/50 px-4 py-2 border-b border-white/5 flex justify-between">
                <span class="text-xs tracking-widest text-white uppercase">Art Showcase</span>
                <span class="text-[10px] text-[#67c1f5]">View All</span>
            </div>
            <div class="p-4 grid grid-cols-12 gap-2">
                <div class="col-span-9 overflow-hidden rounded-sm border border-black shadow-inner bg-black">
                    <img src="https://images.unsplash.com/photo-1578632738908-4521c726eebf?q=80&w=2070" 
                         class="showcase-img w-full h-[400px] object-cover">
                </div>
                <div class="col-span-3 flex flex-col gap-2">
                    <div class="flex-1 overflow-hidden rounded-sm border border-black bg-black">
                         <img src="https://images.unsplash.com/photo-1541462608141-ad6039785906?q=80&w=2070" 
                              class="showcase-img w-full h-full object-cover">
                    </div>
                    <div class="flex-1 overflow-hidden rounded-sm border border-black bg-black">
                         <img src="https://images.unsplash.com/photo-1614728263952-84ea206f99b6?q=80&w=2070" 
                              class="showcase-img w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-4 gap-4">
            <a href="https://store.steampowered.com" class="steam-card p-4 rounded-sm flex flex-col items-center group">
                <img src="https://cdn.simpleicons.org/steam/67c1f5" class="w-10 h-10 mb-2 opacity-80 group-hover:opacity-100">
                <span class="text-[10px] uppercase font-bold text-gray-400 group-hover:text-[#67c1f5]">Steam</span>
            </a>
            <a href="https://bilibili.com" class="steam-card p-4 rounded-sm flex flex-col items-center group">
                <img src="https://cdn.simpleicons.org/bilibili/00AEEC" class="w-10 h-10 mb-2 opacity-80 group-hover:opacity-100">
                <span class="text-[10px] uppercase font-bold text-gray-400 group-hover:text-[#67c1f5]">Bilibili</span>
            </a>
            <a href="https://gemini.google.com" class="steam-card p-4 rounded-sm flex flex-col items-center group">
                <img src="https://cdn.simpleicons.org/googlegemini/4285F4" class="w-10 h-10 mb-2 opacity-80 group-hover:opacity-100">
                <span class="text-[10px] uppercase font-bold text-gray-400 group-hover:text-[#67c1f5]">Gemini</span>
            </a>
            <a href="https://youtube.com" class="steam-card p-4 rounded-sm flex flex-col items-center group">
                <img src="https://cdn.simpleicons.org/youtube/FF0000" class="w-10 h-10 mb-2 opacity-80 group-hover:opacity-100">
                <span class="text-[10px] uppercase font-bold text-gray-400 group-hover:text-[#67c1f5]">YouTube</span>
            </a>
        </div>

    </main>

    <script>
        const input = document.getElementById('search-input');
        const engineSelect = document.getElementById('engine');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && input.value.trim()) {
                window.location.href = engineSelect.value + encodeURIComponent(input.value);
            }
        });
    </script>
</body>
</html>
