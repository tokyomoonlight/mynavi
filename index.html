<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - 药酱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/three@0.154.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.154.0/examples/jsm/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.js"></script>
    <style>
        :root { --miku-blue: #39c5bb; }
        body { background: #ffffff; color: #1e293b; font-family: "Segoe UI", sans-serif; overflow: hidden; }
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background-size: cover; background-position: center; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); border-radius: 1rem; }
        .nav-card { transition: all 0.3s ease; border: 1px solid rgba(0,0,0,0.03); }
        .nav-card:hover { transform: translateY(-5px); background: #ffffff; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-color: var(--miku-blue); }
        #vrm-container { position: fixed; bottom: 0; right: 0; width: 45vw; height: 85vh; z-index: 5; pointer-events: none; }
        .page-content { display: none; animation: fadeIn 0.5s ease; }
        .page-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="bg-container"></div>
    <div id="vrm-container"></div>

    <div class="fixed top-0 w-full z-50 flex justify-between items-center px-10 py-6">
        <div class="flex gap-6 text-[10px] font-black text-slate-400">
            <a href="https://mail.google.com" target="_blank" class="hover:text-blue-500">GMAIL</a>
            <a href="https://docs.google.com" target="_blank" class="hover:text-blue-500">DOCS</a>
            <a href="https://docs.google.com/spreadsheets" target="_blank" class="hover:text-blue-500">SHEETS</a>
        </div>
        <div class="flex gap-4">
            <label class="cursor-pointer glass px-4 py-2 text-[10px] font-bold text-slate-500 hover:bg-slate-50">
                CHANGE BG <input type="file" id="bg-upload" class="hidden" accept="image/*">
            </label>
            <nav class="flex gap-1 glass p-1">
                <button onclick="showPage(0)" class="px-4 py-1 text-[10px] font-bold rounded-lg">HOME</button>
                <button onclick="showPage(1)" class="px-4 py-1 text-[10px] font-bold rounded-lg">MUSIC</button>
            </nav>
        </div>
    </div>

    <main class="relative z-10 max-w-5xl mx-auto pt-40 px-6">
        <div class="flex justify-center mb-16">
            <div class="glass p-2 flex items-center shadow-xl w-full max-w-2xl">
                <select id="engine" class="bg-transparent text-xs ml-4 pr-4 outline-none border-r border-slate-200 cursor-pointer text-slate-500 font-bold">
                    <option value="https://www.bing.com/search?q=" selected>BING</option>
                    <option value="https://www.google.com/search?q=">GOOGLE</option>
                    <option value="https://grok.com/?q=">GROK</option>
                    <option value="https://search.bilibili.com/all?keyword=">BILIBILI</option>
                    <option value="https://yandex.com/search/?text=">YANDEX</option>
                </select>
                <input type="text" id="search-input" autofocus placeholder="Search..." class="bg-transparent w-full px-6 py-4 outline-none text-xl text-slate-800">
            </div>
        </div>

        <div id="page-0" class="page-content page-active">
            <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-4">
                <a href="https://twitter.com" class="glass p-4 flex flex-col items-center nav-card group">
                    <img src="https://cdn.simpleicons.org/x/000000" class="w-7 h-7 mb-2">
                    <span class="text-[9px] font-bold text-slate-400">TWITTER</span>
                </a>
                <a href="https://spotify.com" class="glass p-4 flex flex-col items-center nav-card group">
                    <img src="https://cdn.simpleicons.org/spotify/1DB954" class="w-7 h-7 mb-2">
                    <span class="text-[9px] font-bold text-slate-400">SPOTIFY</span>
                </a>
                <a href="https://grok.com" class="glass p-4 flex flex-col items-center nav-card group">
                    <img src="https://cdn.simpleicons.org/grok/000000" class="w-7 h-7 mb-2">
                    <span class="text-[9px] font-bold text-slate-400">GROK</span>
                </a>
                <a href="https://bilibili.com" class="glass p-4 flex flex-col items-center nav-card group">
                    <img src="https://cdn.simpleicons.org/bilibili/00AEEC" class="w-7 h-7 mb-2">
                    <span class="text-[9px] font-bold text-slate-400">BILIBILI</span>
                </a>
                <a href="https://t.me" class="glass p-4 flex flex-col items-center nav-card group">
                    <img src="https://cdn.simpleicons.org/telegram/26A5E4" class="w-7 h-7 mb-2">
                    <span class="text-[9px] font-bold text-slate-400 text-center leading-tight">TELEGRAM</span>
                </a>
                <a href="https://linux.do" class="glass p-4 flex flex-col items-center nav-card group">
                    <img src="https://cdn.simpleicons.org/linux/black" class="w-7 h-7 mb-2">
                    <span class="text-[9px] font-bold text-slate-400">LINUX.DO</span>
                </a>
            </div>
        </div>

        <div id="page-1" class="page-content">
            <div class="glass p-10 flex flex-col items-center max-w-xl mx-auto">
                <h3 class="text-xl font-black text-[#39c5bb] mb-8">VOCALOID_PLAYER</h3>
                <div class="w-full space-y-2 mb-8">
                    <div onclick="playMusic('./song1.mp3')" class="flex justify-between text-xs font-bold glass p-4 hover:bg-slate-50 cursor-pointer">
                        <span>1. 初音ミク - 消失</span>
                        <span class="opacity-30">PLAY</span>
                    </div>
                </div>
                <audio id="bgm" controls class="w-full h-10 opacity-50"></audio>
            </div>
        </div>
    </main>

    <script>
        function showPage(i) { document.querySelectorAll('.page-content').forEach((p, idx) => p.classList.toggle('page-active', idx === i)); }

        const input = document.getElementById('search-input');
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && input.value.trim()) {
                window.location.href = document.getElementById('engine').value + encodeURIComponent(input.value);
            }
        });

        // 背景修复
        const bgContainer = document.getElementById('bg-container');
        const savedBg = localStorage.getItem('custom-bg');
        if (savedBg) bgContainer.style.backgroundImage = `url(${savedBg})`;
        document.getElementById('bg-upload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                bgContainer.style.backgroundImage = `url(${ev.target.result})`;
                localStorage.setItem('custom-bg', ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // 音乐播放
        function playMusic(src) {
            const bgm = document.getElementById('bgm');
            bgm.src = src;
            bgm.play();
        }

        // VRM 修复：确保相对路径正确
        const container = document.getElementById('vrm-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, container.clientWidth/container.clientHeight, 0.1, 100);
        camera.position.set(0, 1.4, 3.5);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        scene.add(new THREE.DirectionalLight(0xffffff, 1.0));
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const loader = new THREE.GLTFLoader();
        // 💡 重点：这里直接写文件名，确保你上传到 GitHub 的文件也叫这个名字
        loader.load('./mascot.vrm', (gltf) => {
            THREE.VRM.from(gltf).then((vrm) => {
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI;
                window.vrm = vrm;
            });
        }, undefined, (e) => console.error("VRM 加载失败:", e));

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (window.vrm) window.vrm.update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
