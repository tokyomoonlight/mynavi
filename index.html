<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - 药酱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 星空背景设置 */
        body {
            /* 使用高清星空素材，加上渐变遮罩确保文字清晰 */
            background: 
                linear-gradient(to bottom, rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.8)),
                url('https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* 磨砂玻璃效果增强 */
        .glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .icon-btn { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .icon-btn:hover { 
            transform: translateY(-8px) scale(1.15); 
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        /* 搜索框光效 */
        #search-container:focus-within {
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="flex flex-wrap justify-center gap-6 mb-16 px-8 py-5 glass rounded-[2rem] shadow-2xl">
        <a href="https://gemini.google.com" target="_blank" class="icon-btn p-2">
            <img src="https://raw.githubusercontent.com/simple-icons/simple-icons/develop/icons/googlegemini.svg" class="w-9 h-9" style="filter: drop-shadow(0 0 8px #4285F4);" title="Gemini">
        </a>
        <a href="https://www.bilibili.com" target="_blank" class="icon-btn p-2">
            <img src="https://cdn.simpleicons.org/bilibili/00AEEC" class="w-9 h-9" title="Bilibili">
        </a>
        <a href="https://t.me" target="_blank" class="icon-btn p-2">
            <img src="https://cdn.simpleicons.org/telegram/26A5E4" class="w-9 h-9" title="Telegram">
        </a>
        <a href="https://github.com" target="_blank" class="icon-btn p-2">
            <img src="https://cdn.simpleicons.org/github/white" class="w-9 h-9" title="GitHub">
        </a>
        <a href="https://x.com" target="_blank" class="icon-btn p-2">
            <img src="https://cdn.simpleicons.org/x/white" class="w-9 h-9" title="X">
        </a>
        <a href="https://www.reddit.com" target="_blank" class="icon-btn p-2">
            <img src="https://cdn.simpleicons.org/reddit/FF4500" class="w-9 h-9" title="Reddit">
        </a>
        <a href="https://www.zhihu.com" target="_blank" class="icon-btn p-2">
            <img src="https://cdn.simpleicons.org/zhihu/0084FF" class="w-9 h-9" title="知乎">
        </a>
        <a href="https://www.acfun.cn" target="_blank" class="icon-btn p-2">
            <img src="https://cdn.simpleicons.org/anilist/3DB5F3" class="w-9 h-9" style="filter: hue-rotate(150deg);" title="ACFun">
        </a>
        <a href="https://www.youtube.com" target="_blank" class="icon-btn p-2">
            <img src="https://cdn.simpleicons.org/youtube/FF0000" class="w-9 h-9" title="YouTube">
        </a>
    </div>

    <div class="w-full max-w-2xl" id="search-container">
        <div class="glass p-2 rounded-2xl flex items-center shadow-2xl transition-all duration-500">
            <select id="engine" class="bg-transparent text-sm ml-4 pr-4 outline-none border-r border-slate-700/50 cursor-pointer text-slate-300 font-medium">
                <option value="https://www.google.com/search?q=">Google</option>
                <option value="https://www.bing.com/search?q=">Bing</option>
                <option value="https://github.com/search?q=">GitHub</option>
            </select>
            <input type="text" id="search-input" autofocus 
                   placeholder="探索星辰大海..." 
                   class="bg-transparent w-full px-6 py-4 outline-none text-xl placeholder-slate-500/80">
        </div>
        <div class="mt-6 flex justify-center gap-8 text-[11px] text-slate-400 font-light tracking-[0.3em] uppercase opacity-60">
            <span class="hover:text-blue-400 cursor-help transition-colors">Alt + 1/2/3 Switch</span>
            <span class="hover:text-blue-400 cursor-help transition-colors">/ Focus Search</span>
        </div>
    </div>

    <script>
        const input = document.getElementById('search-input');
        const engineSelect = document.getElementById('engine');

        function doSearch() {
            const query = input.value.trim();
            if (query) {
                window.location.href = engineSelect.value + encodeURIComponent(query);
            }
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== input) {
                e.preventDefault();
                input.focus();
            }
            if (e.altKey && ['1', '2', '3'].includes(e.key)) {
                engineSelect.selectedIndex = parseInt(e.key) - 1;
                input.focus();
            }
        });
    </script>
</body>
</html>
